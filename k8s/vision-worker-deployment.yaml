apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-vision
  namespace: volleyball-tracker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker-vision
  template:
    metadata:
      labels:
        app: worker-vision
    spec:
      # Pin vision workers to GPU nodes
      nodeSelector:
        accelerator: nvidia-gpu
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
      containers:
        - name: worker-vision
          image: volleyball-tracker/vision-worker:latest
          command:
            - celery
            - -A
            - workers.celery_app
            - worker
            - -Q
            - vision
            - -c
            - "2"          # 2 concurrent tasks per GPU worker
            - --loglevel=info
          envFrom:
            - secretRef:
                name: app-secrets
          resources:
            requests:
              cpu: "2"
              memory: "4Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: "8Gi"
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: tmp-frames
              mountPath: /tmp/frames
      volumes:
        - name: tmp-frames
          emptyDir:
            sizeLimit: 10Gi
---
# HPA: scale vision workers based on Redis queue depth
# Requires KEDA (Kubernetes Event Driven Autoscaler) for queue-based scaling
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: vision-worker-scaler
  namespace: volleyball-tracker
spec:
  scaleTargetRef:
    name: worker-vision
  minReplicaCount: 2
  maxReplicaCount: 20
  triggers:
    - type: redis
      metadata:
        address: redis:6379
        listName: celery          # Celery default queue list key
        listLength: "5"           # Scale up when queue depth > 5 jobs per worker
