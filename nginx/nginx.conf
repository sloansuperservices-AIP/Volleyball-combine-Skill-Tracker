worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip            on;
    gzip_types      text/plain application/json application/x-mpegurl video/mp2t;

    # HLS MIME types
    types {
        application/x-mpegurl  m3u8;
        video/mp2t             ts;
    }

    # ── API upstream ─────────────────────────────────────────────────────────
    upstream api {
        least_conn;                  # balance to least-busy API pod
        server api:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 0;      # No limit — uploads go direct to MinIO

        # ── API proxy ────────────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://api;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 30s;
        }

        # ── HLS video delivery (served from local volume) ────────────────────
        location /hls/ {
            alias /var/www/hls/;

            # Aggressive caching for .ts segments (immutable content)
            location ~* \.ts$ {
                add_header Cache-Control "public, max-age=31536000, immutable";
            }

            # Short cache for .m3u8 playlists (updated during transcoding)
            location ~* \.m3u8$ {
                add_header Cache-Control "public, max-age=5";
                add_header Access-Control-Allow-Origin *;
            }
        }

        # ── Health check ─────────────────────────────────────────────────────
        location /health {
            return 200 "ok\n";
            access_log off;
        }
    }
}
