*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

.nav-tab.active{background:#f0a500;color:#000}

.player-card.declined{background:#2a1215;border-color:#ef535033;opacity:.6}

table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:7px 6px;text-align:left;color:#78909c;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;border-bottom:2px solid #2a2e38;background:#0d1017;position:sticky;top:0}
td{padding:5px 6px;vertical-align:middle;border-bottom:1px solid #161a22}
tr:hover td{background:#1a1d24;cursor:pointer}
.sticky-header{position:sticky;top:0;z-index:50;background:#1a1d24;border-bottom:1px solid #1e222b;padding:12px 20px}
.depth-col{background:#12151c;border-radius:12px;border:1px solid #1e222b;overflow:hidden;display:flex;flex-direction:column}
.depth-col-header{padding:10px 14px;background:#1a1d24;border-bottom:1px solid #1e222b;display:flex;justify-content:space-between;align-items:center}

.drop-zone{padding:10px;min-height:120px}

@media print{.no-print{display:none!important}body{background:#fff;color:#000}.team-print{border:1px solid #ccc!important;border-radius:8px;margin-bottom:12px;break-inside:avoid}}

// ‚ĒÄ‚ĒÄ UTILS ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
function posAbbr(p){
  if(!p) return '---'; const s=p.toLowerCase();
  if(s.includes('setter')||s==='s') return 'S';
  if(s.includes('middle')||s==='mb') return 'M';
  if(s.includes('outside')||s==='oh') return 'OH';
  if(s.includes('right side')||s==='rs') return 'RS';
  if(s.includes('defensive')||s==='ds') return 'DS';
  if(s.includes('libero')||s==='l') return 'L';
  if(s.includes('unsure')) return '?';
  return p.substring(0,3).toUpperCase();
}
function classifyPos(p){
  if(!p) return 'unsorted'; const s=p.toLowerCase();
  for(const c of POS_CATS) {
    if(c.abbrs.some(a => a.length <= 2 ? s === a : s.includes(a))) return c.key;
  }
  return 'unsorted';
}
function divAge(d){const m=(d||'').match(/(\d+)/);return m?m[1]:'';}
function sAvg(metrics,key){
  const v=((metrics||{})[key]||[]).filter(x=>x!==''&&x!==null&&!isNaN(Number(x))).map(Number);
  return v.length?v.reduce((a,b)=>a+b,0)/v.length:null;
}
function totalScore(metrics, drillScore){
  let s=0,c=0;
  STATIONS.filter(st=>!st.isCheckin).forEach(st=>{
    const a=sAvg(metrics,st.key);
    if(a!==null){s+=a;c++;}
  });
  if(drillScore && !isNaN(Number(drillScore))){
    s += Number(drillScore);
    c++;
  }
  return c>0?(s/c).toFixed(1):null;
}
function scoreColor(sc){return Number(sc)>=7?'#66bb6a':Number(sc)>=5?'#ffa726':'#ef5350';}
let toN=100;
function mkId(){return Math.random().toString(36).substr(2,6);}
function initAthletes(raw){
  return raw.filter(a=>a.first).map(a=>({
    ...a,
    id:a.id||`${a.first}-${mkId()}`,
    to:a.to||String(toN++),
    ageGroup:divAge(a.division),
    posCategory:classifyPos(a.primaryPos),
    status:a.status||'pending',
    teamAssignment:a.teamAssignment||null,
    teamLocked:a.teamLocked||false,
    coachPos:a.coachPos||'',
    hidden:a.hidden||false,
    hideReason:a.hideReason||'',
    isWalkup:a.isWalkup||false,
    arrived:a.arrived||false,
    notes:a.notes||'',
    wontAccept:a.wontAccept||'',
    drillScore:a.drillScore||'',
    metrics:a.metrics||{},
  }));
}
function saveLocal(a){try{localStorage.setItem(LOCAL_KEY,JSON.stringify(a));}catch(e){}}
function loadLocal(){try{return JSON.parse(localStorage.getItem(LOCAL_KEY)||'null');}catch(e){return null;}}
function exportCSV(rows,name){
  const csv=rows.map(r=>r.map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download=name; a.click();
}

          onInput=${e=>{setPin(e.target.value);setErr('');}}
          onKeyDown=${e=>e.key==='Enter'&&go()}
          style=${{width:'100%',padding:12,background:'#12151c',border:'1px solid #2a2e38',borderRadius:8,color:'#e8eaed',fontSize:22,textAlign:'center',letterSpacing:12,marginBottom:10}}/>

          </div>
          <div>Head Coach: <span style=${{color:'#ef5350',fontFamily:'monospace'}}>0000</span></div>

// ‚ĒÄ‚ĒÄ CHECK-IN ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
function CheckIn({athletes,onArrive,onAddWalkup,onUpdate,onLogout}){
  const [q,setQ]=useState('');
  const [wu,setWu]=useState(false);
  const [selAth,setSelAth]=useState(null);
  const [form,setForm]=useState({first:'',last:'',dob:'',division:'12 & Under',primaryPos:'Outside Hitter',altPos:'',phone:'',email:''});
  const [recent,setRecent]=useState([]);
  const results=useMemo(()=>{
    const s=q.trim().toLowerCase();
    if(!s) return [];
    return athletes.filter(a=>!a.hidden&&(a.first.toLowerCase().includes(s)||a.last.toLowerCase().includes(s)||a.to.includes(q.trim())));
  },[q,athletes]);
  const arrive=a=>{onArrive(a.id);setRecent(p=>[a,...p.filter(x=>x.id!==a.id)].slice(0,8));setQ('');};
  const addWu=()=>{
    if(!form.first||!form.last) return;
    const id=`wu-${Date.now()}`;
    onAddWalkup({...form,id,to:String(200+athletes.filter(a=>a.isWalkup).length),isWalkup:true,arrived:true,status:'arrived'});
    setRecent(p=>[{...form,isWalkup:true},...p].slice(0,8));
    setForm({first:'',last:'',dob:'',division:'12 & Under',primaryPos:'Outside Hitter',phone:'',email:''});
    setWu(false);
  };
  const arrived=athletes.filter(a=>a.arrived&&!a.hidden).length;
  return html`
    <div style=${{minHeight:'100vh',background:'#0d1017'}}>
      <div class="sticky-header" style=${{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div><h1 style=${{fontSize:20,fontWeight:800,color:'#26c6da',margin:0}}>Check-In Station</h1>
          <p style=${{fontSize:12,color:'#546e7a',margin:0}}>Mid TN VBC Tryouts</p></div>
        <div style=${{display:'flex',gap:12,alignItems:'center'}}>
          <div style=${{textAlign:'center'}}><div style=${{fontSize:28,fontWeight:800,color:'#26c6da'}}>${arrived}</div>
            <div style=${{fontSize:10,color:'#546e7a',textTransform:'uppercase'}}>Arrived / ${athletes.filter(a=>!a.hidden).length}</div></div>
          <${Btn} sm onClick=${()=>setWu(true)} color="#f0a500" style=${{border:'2px solid #f0a500',boxShadow:'0 0 10px rgba(240,165,0,0.3)'}}>+ Walkup<//>
          <${Btn} sm onClick=${onLogout} color="#ef5350" outline>Log Out<//>
        </div>
      </div>
      <div style=${{maxWidth:560,margin:'0 auto',padding:24}}>
        ${!wu?html`
          <div class="card" style=${{padding:20,marginBottom:16}}>
            <label class="label">Search by name or TO#</label>
            <input class="input" placeholder="Type name or TO#..." autoFocus value=${q}
              onInput=${e=>setQ(e.target.value)} style=${{fontSize:18,padding:12}}/>
            ${q&&!results.length&&html`<div style=${{marginTop:8,fontSize:12,color:'#ef5350'}}>No match ‚ÄĒ use walkup button</div>`}
          </div>
          ${results.map(a=>html`
            <div style=${{display:'flex',alignItems:'center',gap:10,padding:'12px 16px',background:a.arrived?'#0a2010':'#1a1d24',border:`1px solid ${a.arrived?'#66bb6a44':'#2a2e38'}`,borderRadius:10,marginBottom:8}}>
              <span style=${{fontFamily:'monospace',color:'#4fc3f7',fontSize:12}}>  #${a.to}</span>
              <div style=${{flex:1}}><div style=${{fontWeight:700,fontSize:15}}>${a.first} ${a.last}</div>
                <div style=${{fontSize:11,color:'#78909c'}}>${a.division} ¬∑ ${posAbbr(a.primaryPos)}</div></div>
              ${a.isWalkup&&html`<${Badge} c="#ffa726" sm>Walkup<//>`}
              ${a.arrived
                ? html`<div style=${{display:'flex',gap:8}}><${Badge} c="#66bb6a">‚úď Arrived<//><${Btn} sm onClick=${()=>setSelAth(a)} color="#4fc3f7" outline style=${{borderWidth:2}}>Edit Profile ‚úŹÔłŹ<//></div>`
                : html`<div style=${{display:'flex',gap:8}}><${Btn} onClick=${()=>arrive(a)} color="#26c6da" style=${{padding:'8px 20px',fontSize:14}}>Mark Arrived ‚úď<//><${Btn} sm onClick=${()=>setSelAth(a)} color="#4fc3f7" outline style=${{borderWidth:2}}>Edit Profile ‚úŹÔłŹ<//></div>`}
            </div>`)}
          ${recent.length>0&&html`
            <div class="card" style=${{padding:14,marginTop:8}}>
              <div style=${{fontSize:11,color:'#546e7a',textTransform:'uppercase',letterSpacing:1,marginBottom:8}}>Recent Check-Ins</div>
              ${recent.map((a,i)=>html`
                <div key=${i} style=${{display:'flex',alignItems:'center',gap:8,padding:'5px 0',borderBottom:'1px solid #1e222b'}}>
                  <span style=${{fontFamily:'monospace',color:'#4fc3f7',fontSize:11}}>#${a.to||'WU'}</span>
                  <span style=${{flex:1,fontSize:12}}>${a.first} ${a.last}</span>
                  <${Badge} c="#26c6da" sm>‚úď<//>
                  ${a.isWalkup&&html`<${Badge} c="#ffa726" sm>WU<//>`}
                </div>`)}`}
        `:html`
          <div class="card" style=${{padding:24,border:'1px solid #f0a50033'}}>
            <div style=${{display:'flex',justifyContent:'space-between',marginBottom:20}}>
              <h3 style=${{color:'#f0a500',fontSize:16,margin:0}}>Add Walkup</h3>
              <${Btn} sm onClick=${()=>setWu(false)} color="#2a2e38">Cancel<//>
            </div>
            <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
              ${[['First *','first'],['Last *','last'],['DOB','dob'],['Phone','phone']].map(([l,k])=>html`
                <div key=${k}><label class="label">${l}</label>
                  <input class="input" value=${form[k]} onInput=${e=>setForm(p=>({...p,[k]:e.target.value}))}/></div>`)}
              <div style=${{gridColumn:'span 2'}}><label class="label">Email</label>
                <input class="input" value=${form.email} onInput=${e=>setForm(p=>({...p,email:e.target.value}))}/></div>
              <div><label class="label">Division *</label>
                <select class="select" value=${form.division} onChange=${e=>setForm(p=>({...p,division:e.target.value}))}>
                  ${AGES.map(a=>html`<option value=${a+' & Under'}>${a}s</option>`)}</select></div>
              <div><label class="label">Primary Pos *</label>
                <select class="select" value=${form.primaryPos} onChange=${e=>setForm(p=>({...p,primaryPos:e.target.value}))}>
                  ${['Outside Hitter','Middle Hitter','Setter','Right Side Hitter','Defensive Specialist','Libero','I am unsure'].map(p=>html`<option>${p}</option>`)}</select></div>
              <div><label class="label">Alt Position</label>
                <select class="select" value=${form.altPos} onChange=${e=>setForm(p=>({...p,altPos:e.target.value}))}>
                  ${['N/A','Outside Hitter','Middle Hitter','Setter','Right Side Hitter','Defensive Specialist','Libero'].map(p=>html`<option>${p}</option>`)}</select></div>
            </div>
            <${Btn} onClick=${addWu} color="#f0a500" disabled=${!form.first||!form.last} style=${{width:'100%',padding:12,fontSize:14}}>Add & Check In ‚úď<//>
          </div>`}
      </div>
      <${AthleteModal} athlete=${selAth} onClose=${()=>setSelAth(null)} onChange=${onUpdate}
        onHide=${()=>{}} onUnhide=${()=>{}} onEmail=${()=>{}}/>
    </div>`;
}

// ‚ĒÄ‚ĒÄ STATION ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
function Station({stationKey,label,metrics:metricDefs,athletes,onMetric,onLogout}){
  const [q,setQ]=useState('');
  const [active,setActive]=useState(null);
  const locked = active && (active.teamLocked || active.status === 'accepted');
  const [recent,setRecent]=useState([]);
  const inp=useRef();
  const found=useMemo(()=>{
    const s=q.trim();
    if(!s) return null;
    return athletes.find(a=>a.to===s&&!a.hidden)||athletes.find(a=>(a.first+' '+a.last).toLowerCase()===s.toLowerCase()&&!a.hidden)||null;
  },[q,athletes]);
  const vals=active?((active.metrics||{})[stationKey]||metricDefs.map(()=>'')):metricDefs.map(()=>'');
  const avg=active?sAvg(active.metrics,stationKey):null;
  const save=()=>{
    if(active){setRecent(p=>[active,...p.filter(x=>x.id!==active.id)].slice(0,8));setActive(null);setQ('');}
    setTimeout(()=>inp.current?.focus(),50);
  };
  return html`
    <div style=${{minHeight:'100vh',background:'#0d1017'}}>
      <div class="sticky-header no-print" style=${{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div><h1 style=${{fontSize:20,fontWeight:800,color:'#f0a500',margin:0}}>${label}</h1>
          <p style=${{fontSize:12,color:'#546e7a',margin:0}}>Mid TN VBC Tryouts</p></div>
        <${Btn} sm onClick=${onLogout} color="#ef5350" outline>Log Out<//>
      </div>
      <div style=${{maxWidth:520,margin:'0 auto',padding:24}}>
        <div class="card" style=${{padding:20,marginBottom:16}}>
          <label class="label">Athlete TO# or Name</label>
          <div style=${{display:'flex',gap:8}}>
            <input ref=${inp} class="input" placeholder="TO# or full name" autoFocus value=${q}
              onInput=${e=>setQ(e.target.value)} onKeyDown=${e=>e.key==='Enter'&&found&&setActive({...found})}
              style=${{fontFamily:'monospace',fontSize:16}}/>
            <${Btn} onClick=${()=>found&&setActive({...found})} disabled=${!found} color="#f0a500">Load<//>
          </div>
          ${q&&!found&&html`<div style=${{marginTop:6,fontSize:12,color:'#ef5350'}}>Not found</div>`}
        </div>
        ${active&&html`
          <div class="card" style=${{padding:20,marginBottom:16}}>
            <div style=${{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:16}}>
              <div>
                <div style=${{fontSize:20,fontWeight:800}}>${active.first} ${active.last}</div>
                <div style=${{display:'flex',gap:6,marginTop:4,flexWrap:'wrap',alignItems:'center'}}>
                  <span style=${{color:'#4fc3f7',fontFamily:'monospace',fontSize:12}}>TO# ${active.to}</span>
                  <${Badge} c="#78909c" sm>${posAbbr(active.primaryPos)}<//>
                  ${active.altPos&&html`<${Badge} c="#546e7a" sm>${posAbbr(active.altPos)}<//>`}
                  ${active.isWalkup&&html`<${Badge} c="#ffa726" sm>Walkup<//>`}
                </div>
              </div>
              ${avg!==null&&html`<div style=${{textAlign:'right'}}><div style=${{fontSize:11,color:'#78909c'}}>Avg</div><div style=${{fontSize:30,fontWeight:800,color:'#66bb6a'}}>${avg.toFixed(1)}</div></div>`}
            </div>
            <div style=${{display:'grid',gridTemplateColumns:`repeat(${metricDefs.length},1fr)`,gap:12,marginBottom:16}}>
              ${metricDefs.map((lbl,idx)=>html`
                <div key=${idx}>
                  <label class="label">${lbl}</label>
                  <input type="number" value=${vals[idx]||''} autoFocus=${idx===0}
                    disabled=${locked}
                    onInput=${e=>{const nv=[...vals];nv[idx]=e.target.value;onMetric(active.id,stationKey,nv);setActive(a=>({...a,metrics:{...a.metrics,[stationKey]:nv}}));}}
                    onKeyDown=${e=>e.key==='Enter'&&idx===metricDefs.length-1&&save()}
                    style=${{width:'100%',padding:10,background:'#12151c',border:'1px solid #2a2e38',borderRadius:8,color:'#e8eaed',fontSize:24,textAlign:'center',fontFamily:'monospace'}}/>
                </div>`)}
            </div>
            <button onClick=${save} style=${{width:'100%',padding:12,background:locked?'#2a2e38':'#66bb6a',border:'none',borderRadius:8,color:'#fff',fontSize:15,fontWeight:700,cursor:'pointer',opacity:locked?.5:1}} disabled=${locked}>
              ${locked ? 'ūüĒí Locked' : 'Save & Next ‚úď'}
            </button>
          </div>`}
        ${recent.length>0&&html`
          <div class="card" style=${{padding:14}}>
            <div style=${{fontSize:11,color:'#546e7a',textTransform:'uppercase',letterSpacing:1,marginBottom:8}}>Recent (${recent.length})</div>
            ${recent.map(a=>{const av=sAvg(a.metrics,stationKey);return html`
              <div key=${a.id} style=${{display:'flex',alignItems:'center',gap:8,padding:'5px 0',borderBottom:'1px solid #1e222b'}}>
                <span style=${{fontFamily:'monospace',color:'#4fc3f7',fontSize:11}}>#${a.to}</span>
                <span style=${{flex:1,fontSize:12}}>${a.first} ${a.last}</span>
                ${av!==null?html`<${Badge} c="#66bb6a">${av.toFixed(1)}<//>`:''}
                <${Btn} sm onClick=${()=>setActive({...a})} color="#4fc3f7" outline>Edit<//>
              </div>`;})}
          </div>`}
      </div>
    </div>`;
}

// ‚ĒÄ‚ĒÄ ATHLETE MODAL ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
function AthleteModal({athlete,onClose,onChange,onHide,onUnhide,onEmail}){
  if(!athlete) return null;
  const locked = athlete.teamLocked || athlete.status === 'accepted';
  const sc = totalScore(athlete.metrics, athlete.drillScore);
  const [ef,setEf]=useState(null);
  const [ev,setEv]=useState('');
  const startEdit=(k,v)=>{if(locked)return;setEf(k);setEv(v||'');};
  const saveEdit=()=>{if(ef){onChange(athlete.id,{[ef]:ev});setEf(null);}};
  const F=(label,key,opts)=>html`
    <div>
      <div class="label">${label}</div>
      ${ef===key?(opts
        ?html`<select class="select" value=${ev} onChange=${e=>setEv(e.target.value)} onBlur=${saveEdit} autoFocus>${opts.map(o=>html`<option>${o}</option>`)}</select>`
        :html`<input class="input" value=${ev} onInput=${e=>setEv(e.target.value)} onBlur=${saveEdit} onKeyDown=${e=>e.key==='Enter'&&saveEdit()} autoFocus style=${{fontSize:13,padding:'6px 8px'}}/>`)
      :html`<div onClick=${()=>startEdit(key,athlete[key])} style=${{fontSize:13,color:athlete[key]?'#e8eaed':'#444',cursor:locked?'default':'pointer',padding:'2px 0',borderBottom:'1px dashed #2a2e38',wordBreak:'break-all',minHeight:20}}>
        ${athlete[key]||'‚ÄĒ'}${!locked&&html`<span style=${{color:'#4fc3f7',marginLeft:4,fontSize:10}}>‚úŹ</span>`}
      </div>`}
    </div>`;
  return html`
    <div class="modal-overlay" onClick=${onClose}>
      <div class="modal-box" style=${{width:640}} onClick=${e=>e.stopPropagation()}>
        <div style=${{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:16}}>
          <div>
            <h3 style=${{fontSize:20,color:'#e8eaed',margin:0,display:'flex',alignItems:'center',gap:8}}>
              ${locked&&'ūüĒí '}${athlete.first} ${athlete.last}
              ${athlete.isWalkup&&html`<${Badge} c="#ffa726" sm>Walkup<//>`}
              ${athlete.arrived&&html`<${Badge} c="#26c6da" sm>‚úď Arrived<//>`}
            </h3>
            <div style=${{display:'flex',gap:8,marginTop:6,flexWrap:'wrap',alignItems:'center'}}>
              <span style=${{color:'#4fc3f7',fontFamily:'monospace',fontSize:13}}>TO# ${athlete.to}</span>
              ${sc&&html`<${Badge} c=${scoreColor(sc)}>Score: ${sc}<//>`}
              <${SBadge} status=${athlete.status}/>
              ${athlete.wontAccept&&html`<span title=${athlete.wontAccept}>‚ö†ÔłŹ</span>`}
            </div>
          </div>
          <button onClick=${onClose} style=${{background:'none',border:'none',color:'#666',fontSize:24,cursor:'pointer'}}>√ó</button>
        </div>
        <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px 20px',marginBottom:16}}>
          ${F('First Name','first')}${F('Last Name','last')}
          ${F('Date of Birth','dob')}${F('Division','division',AGES.map(a=>a+' & Under'))}
          ${F('Primary Position','primaryPos',['Outside Hitter','Middle Hitter','Setter','Right Side Hitter','Defensive Specialist','Libero','I am unsure'])}
          ${F('Alt Position','altPos',['Outside Hitter','Middle Hitter','Setter','Right Side Hitter','Defensive Specialist','Libero','N/A'])}
          ${F('Phone','phone')}${F('Email','email')}
        </div>
        <div style=${{marginBottom:14}}>
          <label class="label" style=${{fontWeight:800,color:'#f0a500'}}>Tryout Notes & Call Log</label>
          <textarea class="input" rows="5" placeholder="Add call log, tryout notes, parent concerns..."
            value=${athlete.notes||''} onInput=${e=>onChange(athlete.id,{notes:e.target.value})} disabled=${locked}
            style=${{lineHeight:1.6,resize:'vertical',height:'auto',border:'1px solid #f0a50044'}}></textarea>
        </div>
        <div style=${{marginBottom:16}}>
          <label class="label" style=${{color:'#ffa726',fontWeight:800}}>‚ö†ÔłŹ Won't Accept / Team Restrictions</label>
          <input class="input" placeholder="e.g. Will not accept 14 Silver or lower"
            value=${athlete.wontAccept||''} onInput=${e=>onChange(athlete.id,{wontAccept:e.target.value})} disabled=${locked}
            style=${{borderColor:'#ffa72688'}}/>
        </div>
        <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,marginBottom:14}}>
          <div><label class="label">Status</label>
            <select class="select" value=${athlete.status} onChange=${e=>onChange(athlete.id,{status:e.target.value})} disabled=${locked}>
              ${STATUSES.map(s=>html`<option value=${s}>${s.charAt(0).toUpperCase()+s.slice(1).replace('_',' ')}</option>`)}</select></div>
          <div><label class="label">Coach POS</label>
            <select class="select" value=${athlete.coachPos||''} onChange=${e=>onChange(athlete.id,{coachPos:e.target.value})} disabled=${locked}>

          <div><label class="label">Arrived</label>
            <select class="select" value=${athlete.arrived?'yes':'no'}

                      <input type="number" value=${vs[idx]||''} disabled=${locked}
                        onInput=${e=>{const nv=[...vs];nv[idx]=e.target.value;onChange(athlete.id,{metrics:{...athlete.metrics,[st.key]:nv}});}}

                </div>

              <label class="label" style=${{margin:0}}>Drill Score (1-10)</label>
              <input type="number" min="0" max="10" step="0.5" value=${athlete.drillScore||''}
                onInput=${e=>onChange(athlete.id,{drillScore:e.target.value})}

        <div style=${{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>

          ${!locked&&!athlete.hidden&&html`<${Btn} onClick=${()=>{onHide(athlete);onClose();}} danger outline>Hide<//>`}
          ${athlete.hidden&&html`<${Btn} onClick=${()=>{onUnhide(athlete.id);onClose();}} color="#66bb6a">Unhide<//>`}
          ${locked&&html`<${Badge} c="#66bb6a">ūüĒí Accepted ‚ÄĒ Locked<//>`}

// ‚ĒÄ‚ĒÄ HEAD COACH ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
function HeadCoach({athletes,setAthletes,onLogout}){
  const [view,setView]=useState('allreg');
  const [age,setAge]=useState('12');
  const [selAth,setSelAth]=useState(null);
  const [emailAth,setEmailAth]=useState(null);
  const [emailTeam,setEmailTeam]=useState('');
  const [hideAth,setHideAth]=useState(null);
  const [teamOfferKey,setTeamOfferKey]=useState(null);

  useEffect(()=>saveLocal(athletes),[athletes]);

  const upd=useCallback((id,updates)=>{
    setAthletes(p=>p.map(a=>{
      if(a.id!==id) return a;
      let next={...a,...updates};
      if(updates.status==='accepted') next.teamLocked=true;
      else if(updates.status && a.status==='accepted') next.teamLocked=false;
      return next;
    }));
    setSelAth(p=>{
      if(p?.id!==id) return p;
      let next={...p,...updates};
      if(updates.status==='accepted') next.teamLocked=true;
      else if(updates.status && p.status==='accepted') next.teamLocked=false;
      return next;
    });
  },[]);
  const updMetric=useCallback((id,key,vals)=>{
    setAthletes(p=>p.map(a=>a.id===id?{...a,metrics:{...a.metrics,[key]:vals}}:a));
    setSelAth(p=>p?.id===id?{...p,metrics:{...p.metrics,[key]:vals}}:p);
  },[]);
  const addWalkup=useCallback(wu=>{setAthletes(p=>[...p,...initAthletes([wu])]);},[]);
  const doHide=(id,reason,note)=>upd(id,{hidden:true,hideReason:reason,hideNote:note,teamAssignment:null,teamLocked:false});
  const doUnhide=id=>upd(id,{hidden:false,hideReason:'',hideNote:''});
  const doArrive=id=>upd(id,{arrived:true,status:'arrived'});
  const doEmail=(athlete,body,team)=>{
    upd(athlete.id,{status:['pending','arrived'].includes(athlete.status)?'contacted':athlete.status});
    if(athlete.email) window.open(`mailto:${athlete.email}?subject=${encodeURIComponent('Mid TN VBC - Offer'+(team?' - '+team:''))}&body=${encodeURIComponent(body)}`,'_blank');
    else navigator.clipboard?.writeText(body);
  };

  const exportToCSV=()=>{
    const headers=['TO#','First','Last','Age','Primary','Alt','Coach','Status','Team','Score','Drill','Height','Reach','Vertical','Shuttle','Arrived','Notes','WontAccept','Phone','Email'];
    const rows=athletes.filter(a=>!a.hidden).map(a=>[
      a.to,a.first,a.last,a.ageGroup+'s',a.primaryPos,a.altPos,a.coachPos,a.status,a.teamAssignment||'',totalScore(a.metrics, a.drillScore)||'',
      a.drillScore||'',(a.metrics?.s1?.[0]||''),(a.metrics?.s1?.[1]||''),(a.metrics?.s1?.[2]||''),(a.metrics?.s2?.[0]||''),
      a.arrived?'YES':'NO',(a.notes||'').replace(/"/g,'""'),(a.wontAccept||'').replace(/"/g,'""'),a.phone,a.email
    ]);
    const csvContent='data:text/csv;charset=utf-8,'+headers.join(',')+'\n'+rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
    const encodedUri=encodeURI(csvContent);
    const link=document.createElement('a');
    link.setAttribute('href',encodedUri);
    link.setAttribute('download',`midtn_tryouts_export_${new Date().toISOString().slice(0,10)}.csv`);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  };

  const hidden=athletes.filter(a=>a.hidden);
  const arrived=athletes.filter(a=>a.arrived&&!a.hidden).length;
  const assigned=athletes.filter(a=>a.teamAssignment&&!a.hidden).length;
  const accepted=athletes.filter(a=>a.status==='accepted'&&!a.hidden).length;
  const walkups=athletes.filter(a=>a.isWalkup&&!a.hidden).length;
  const VIEWS=['allreg','depth','results','teams','allteams','hidden'];
  const VLABELS={allreg:'All Reg',depth:'Depth Chart',results:'Results',teams:'Team Builder',allteams:'All Teams',hidden:`Hidden (${hidden.length})`};
  const showAgeNav=['depth','results','teams'].includes(view);

  // ‚ĒÄ‚ĒÄ ALL REG ‚ĒÄ‚ĒÄ
  const [regQ,setRegQ]=useState('');
  const [addWu,setAddWu]=useState(false);
  const [wuForm,setWuForm]=useState({first:'',last:'',dob:'',division:'12 & Under',primaryPos:'Outside Hitter',altPos:'',phone:'',email:''});
  const regList=useMemo(()=>{
    let l=athletes.filter(a=>!a.hidden);
    if(regQ){const s=regQ.toLowerCase();l=l.filter(a=>a.first.toLowerCase().includes(s)||a.last.toLowerCase().includes(s)||a.to.includes(regQ)||(a.division||'').toLowerCase().includes(s)||(a.primaryPos||'').toLowerCase().includes(s));}
    return l;
  },[athletes,regQ]);
  const submitWu=()=>{
    if(!wuForm.first||!wuForm.last) return;
    addWalkup({...wuForm,id:`wu-${Date.now()}`,to:String(200+athletes.filter(a=>a.isWalkup).length),isWalkup:true,arrived:true,status:'arrived'});

    setAddWu(false);

  // ‚ĒÄ‚ĒÄ DEPTH ‚ĒÄ‚ĒÄ
  const depthPool=useMemo(()=>{
    const pool=athletes.filter(a=>a.ageGroup===age&&!a.hidden);
    const g={setter:[],middle:[],outside:[],defense:[],unsorted:[]};
    pool.forEach(a=>(g[a.posCategory]||g.unsorted).push(a));
    Object.keys(g).forEach(k=>g[k].sort((a,b)=>(Number(totalScore(b.metrics, b.drillScore))||0)-(Number(totalScore(a.metrics, a.drillScore))||0)));
    return g;
  },[athletes,age]);

  // ‚ĒÄ‚ĒÄ RESULTS ‚ĒÄ‚ĒÄ

    const l=athletes.filter(a=>a.ageGroup===age&&!a.hidden);
    if(resSort==='score') l.sort((a,b)=>(Number(totalScore(b.metrics, b.drillScore))||0)-(Number(totalScore(a.metrics, a.drillScore))||0));
    else if(resSort==='name') l.sort((a,b)=>a.last.localeCompare(b.last));
    else l.sort((a,b)=>(sAvg(b.metrics,resSort)||0)-(sAvg(a.metrics,resSort)||0));
    return l;
  },[athletes,age,resSort]);

  // ‚ĒÄ‚ĒÄ TEAMS ‚ĒÄ‚ĒÄ
  const [poolSort,setPoolSort]=useState('pos');
  const [showPool,setShowPool]=useState(true);
  const [widePool,setWidePool]=useState(false);

  const [showAllPool,setShowAllPool]=useState(false);
  const ageAths=athletes.filter(a=>a.ageGroup===age&&!a.hidden);
  const pool=useMemo(()=>{
    let l=showAllPool ? [...ageAths] : ageAths.filter(a=>!a.teamAssignment);
    if(poolSort==='score') {
      l.sort((a,b)=>(Number(totalScore(b.metrics, b.drillScore))||0)-(Number(totalScore(a.metrics, a.drillScore))||0));
    } else if(poolSort==='name') {
      l.sort((a,b)=>a.last.localeCompare(b.last));
    } else if(poolSort==='pos') {
      const order = {setter:1, middle:2, outside:3, defense:4, unsorted:5};
      l.sort((a,b)=>{
        if(a.posCategory !== b.posCategory) return (order[a.posCategory]||99) - (order[b.posCategory]||99);
        return (Number(totalScore(b.metrics, b.drillScore))||0)-(Number(totalScore(a.metrics, a.drillScore))||0);
      });
    }
    return l;
  },[ageAths,poolSort,showAllPool]);
  const drop=(e,teamKey)=>{
    e.preventDefault();
    const id=e.dataTransfer.getData('text/plain');
    const a=athletes.find(x=>x.id===id);
    const roster=athletes.filter(ath=>ath.teamAssignment===teamKey);
    const isLocked=roster.length>0&&roster.every(ath=>ath.teamLocked);
    if(a&&!a.teamLocked&&a.status!=='accepted'&&!isLocked) upd(id,{teamAssignment:teamKey});
    setDragOver(null);
  };

  const th={};
  const td={};

  return html`
    <div style=${{minHeight:'100vh',background:'#0d1017',paddingBottom:20}}>
      <div class="sticky-header no-print">
        <div style=${{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap',marginBottom:10}}>
          <a href="../" style=${{color:'#546e7a',textDecoration:'none',fontSize:12}}>‚Üź Hub</a>
          <span style=${{color:'#2a2e38'}}>|</span>
          <h1 style=${{margin:0,fontSize:18,fontWeight:800}}><span style=${{color:'#f0a500'}}>MID TN</span> VBC Tryout Manager</h1>
          <div style=${{flex:1}}/>
          <${Badge} c="#26c6da">${arrived} Arrived<//>
          <${Badge} c="#66bb6a">${assigned} Assigned<//>
          <${Badge} c="#ab47bc">${accepted} Accepted<//>
          <${Badge} c="#ffa726">${walkups} Walkups<//>
          <${Btn} sm onClick=${exportToCSV} color="#26c6da" outline>Export CSV<//>
          <${Btn} sm onClick=${()=>window.print()} color="#78909c" outline>Print<//>
          <${Btn} sm onClick=${onLogout} color="#ef5350" outline>Log Out<//>
        </div>
        <div style=${{display:'flex',gap:4,flexWrap:'wrap',alignItems:'center'}}>
          ${VIEWS.map(v=>html`<button key=${v} class=${'nav-tab'+(view===v?' active':'')} onClick=${()=>setView(v)}>${VLABELS[v]}</button>`)}
          <div style=${{flex:1}}/>
          ${showAgeNav&&html`
            <div style=${{display:'flex',gap:2,background:'#12151c',borderRadius:6,padding:2}}>
              ${AGES.map(a=>html`<button key=${a} class=${'age-tab'+(age===a?' active':'')} onClick=${()=>setAge(a)}>${a}s</button>`)}</div>`}
          ${view==='allteams'&&html`
            <${Btn} sm onClick=${()=>exportCSV([['Age','Team','TO#','First','Last','POS','Coach POS','Score','Drill','Height','Reach','Vertical','Shuttle','Status','Phone','Email','Notes','WontAccept'],...athletes.filter(a=>a.teamAssignment&&!a.hidden).map(a=>[a.ageGroup+'s',a.teamAssignment,a.to,a.first,a.last,a.primaryPos,a.coachPos,totalScore(a.metrics, a.drillScore)||'',a.drillScore||'',(a.metrics?.s1?.[0]||''),(a.metrics?.s1?.[1]||''),(a.metrics?.s1?.[2]||''),(a.metrics?.s2?.[0]||''),a.status,a.phone,a.email,a.notes,a.wontAccept])],'MidTN_Teams.csv')} color="#66bb6a" outline>Export CSV<//>
            <${Btn} sm onClick=${()=>window.print()} color="#4fc3f7" outline>Print<//>

              <${Btn} sm onClick=${()=>exportCSV([['TO#','First','Last','Division','Primary','Alt','Score','Drill','Height','Reach','Vertical','Shuttle','Status','Arrived','Walkup','Phone','Email','Notes','WontAccept'],...athletes.filter(a=>!a.hidden).map(a=>[a.to,a.first,a.last,a.division,a.primaryPos,a.altPos,totalScore(a.metrics, a.drillScore)||'',a.drillScore||'',(a.metrics?.s1?.[0]||''),(a.metrics?.s1?.[1]||''),(a.metrics?.s1?.[2]||''),(a.metrics?.s2?.[0]||''),a.status,a.arrived?'Yes':'',a.isWalkup?'Yes':'',a.phone,a.email,a.notes,a.wontAccept])],'MidTN_Reg.csv')} color="#4fc3f7" outline>Export CSV<//>

                          <div style=${{padding:'8px 12px',background:ts.hdr,display:'flex',justifyContent:'space-between'}}>

                            ${roster.map(a=>html`

function TeamOfferModal({teamKey,athletes,onClose,onSendOffer}){
  if(!teamKey) return null;
  const roster=athletes.filter(a=>a.teamAssignment===teamKey);
  const [age,lvl]=teamKey.split('-');
  return html`
    <div class="modal-overlay" onClick=${onClose}>
      <div class="modal-box" style=${{width:500}} onClick=${e=>e.stopPropagation()}>
        <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <h3 style=${{margin:0}}>${age} ${lvl} ‚ÄĒ Send Offers</h3>
          <button onClick=${onClose} style=${{background:'none',border:'none',color:'#666',fontSize:24,cursor:'pointer'}}>√ó</button>
        </div>
        <div style=${{maxHeight:400,overflowY:'auto',marginBottom:16}}>
          ${roster.map(a=>html`
            <div key=${a.id} style=${{display:'flex',alignItems:'center',gap:10,padding:'10px 0',borderBottom:'1px solid #2a2e38'}}>
              <div style=${{flex:1}}>
                <div style=${{fontWeight:700}}>${a.first} ${a.last}</div>
                <div style=${{fontSize:11,color:'#78909c'}}>${posAbbr(a.primaryPos)} ¬∑ ${a.status}</div>
              </div>
              ${['accepted','declined','offered'].includes(a.status)
                ? html`<${Badge} c=${a.status==='accepted'?'#66bb6a':a.status==='declined'?'#ef5350':'#42a5f5'} sm>${a.status}<//>`
                : html`<${Btn} sm onClick=${()=>onSendOffer(a)} color="#f0a500">Send Offer<//>`}
            </div>`)}
        </div>
        <${Btn} onClick=${onClose} style=${{width:'100%'}} color="#2a2e38">Done<//>
      </div>
    </div>`;
}

// ‚ĒÄ‚ĒÄ ROOT ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
function App(){
  const [user,setUser]=useState(null);
  const [athletes,setAthletes]=useState(()=>{
    const l=loadLocal();
    return l?initAthletes(l):initAthletes(RAW);
  });
  const updMetric=useCallback((id,key,vals)=>{
    setAthletes(p=>p.map(a=>a.id===id?{...a,metrics:{...a.metrics,[key]:vals}}:a));
  },[]);
  const doArrive=useCallback(id=>{setAthletes(p=>p.map(a=>a.id===id?{...a,arrived:true,status:'arrived'}:a));},[]);
  const addWalkup=useCallback(wu=>{setAthletes(p=>[...p,...initAthletes([wu])]);},[]);
  useEffect(()=>{if(athletes.length) saveLocal(athletes);},[athletes]);
  if(!user) return html`<${Login} onLogin=${setUser}/>`;
  if(user.role==='station'&&user.isCheckin) return html`<${CheckIn} athletes=${athletes} onArrive=${doArrive} onAddWalkup=${addWalkup} onUpdate=${(id,u)=>setAthletes(p=>p.map(a=>a.id===id?{...a,...u}:a))} onLogout=${()=>setUser(null)}/>`;
  if(user.role==='station') return html`<${Station} stationKey=${user.key} label=${user.label} metrics=${user.metrics} athletes=${athletes} onMetric=${updMetric} onLogout=${()=>setUser(null)}/>`;
  return html`<${HeadCoach} athletes=${athletes} setAthletes=${setAthletes} onLogout=${()=>setUser(null)}/>`;
}
render(html`<${App}/>`,document.getElementById('app'));
</script>
